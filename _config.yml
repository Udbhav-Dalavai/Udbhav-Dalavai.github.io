# Jekyll Configuration

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Udbhav Dalavai"
title_separator          : "-"
name                     : &name "Udbhav Dalavai"
description              : &description "PhD Researcher in Statistics, Birkbeck, University of London. Working on network models, Bayesian inference, and uncertainty quantification."
url                      : https://Udbhav-Dalavai.github.io
baseurl                  : ""
repository               : "Udbhav-Dalavai/Udbhav-Dalavai.github.io"

# Site Author
author:
  avatar           : "profile.png"   # place your photo at images/profile.png
  name             : "Udbhav Dalavai"
  pronouns         :
  bio              : "PhD Researcher in Statistics at Birkbeck, University of London"
  location         : "London, UK"
  employer         : "Birkbeck, University of London"
  uri              :
  email            : "u.dalavai [at] bbk.ac.uk"

  # Academic websites
  academia         :
  arxiv            :
